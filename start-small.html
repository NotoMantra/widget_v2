<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Start Small</title>
<style>
  :root {
    --green: #4F9D69;
    --glow: rgba(79, 157, 105, 0.42);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: transparent; }

  body {
    display: grid;
    place-items: center;
    padding: 14px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  .frame {
    border: 4px solid var(--green);
    border-radius: 24px;
    padding: 26px 24px 22px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    background: transparent;
    box-shadow: 0 14px 50px rgba(79, 157, 105, 0.16);
    max-width: 300px;
    width: 100%;
  }

  .eyebrow {
    color: var(--green);
    font-size: 12.5px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0.85;
  }

  .card {
    position: relative;
    overflow: hidden;
    width: 100%;
    min-height: 132px;
    border-radius: 18px;
    border: 1.5px solid var(--green);
    background: radial-gradient(circle at 50% 40%, rgba(79,157,105,0.14), transparent 75%);
    box-shadow: 0 0 26px var(--glow);
    display: grid;
    place-items: center;
    padding: 20px 20px;
  }

  .card::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(115deg, transparent 30%, rgba(79,157,105,0.22) 50%, transparent 70%);
    transform: translateX(-120%);
    pointer-events: none;
  }
  .card.sweep::before { animation: sweep 0.9s ease; }
  @keyframes sweep { to { transform: translateX(120%); } }

  .nudge {
    color: var(--green);
    font-size: 17px;
    font-weight: 500;
    line-height: 1.5;
    letter-spacing: 0.01em;
    text-align: center;
    opacity: 1;
    transition: opacity 0.3s ease;
  }

  .button {
    appearance: none;
    background: transparent;
    border: 1.5px solid var(--green);
    color: var(--green);
    border-radius: 999px;
    padding: 9px 20px;
    font-size: 13.5px;
    font-family: inherit;
    font-weight: 500;
    letter-spacing: 0.03em;
    cursor: pointer;
    opacity: 0.9;
    transition: opacity 0.2s ease, transform 0.1s ease;
  }
  .button:hover { opacity: 1; }
  .button:active { transform: scale(0.96); }
  .button:focus-visible { outline: 2px solid var(--green); outline-offset: 3px; }

  .note {
    color: var(--green);
    opacity: 0.55;
    font-size: 11px;
    line-height: 1.45;
    letter-spacing: 0.02em;
    text-align: center;
    max-width: 242px;
  }

  @media (prefers-reduced-motion: reduce) {
    .nudge { transition: none; }
    .card.sweep::before { animation: none; }
  }
</style>
</head>
<body>
  <div class="frame">
    <div class="eyebrow">Feeling stuck?</div>
    <div class="card">
      <div class="nudge" id="nudge" aria-live="polite"></div>
    </div>
    <button class="button" id="button" type="button">Give me another</button>
    <div class="note">There is no wrong way to start. And choosing to rest instead is allowed too.</div>
  </div>

<script>
(function () {
  var nudgeEl = document.getElementById("nudge");
  var card = nudgeEl.parentNode;
  var button = document.getElementById("button");

  var NUDGES = [
    "Set a timer for two minutes. Do it only until the timer rings.",
    "Do the embarrassingly small version. One dish, not the whole sink.",
    "Stand up. That is the entire task for now.",
    "Let yourself do it badly. Done beats perfect.",
    "Text someone 'starting now' and borrow their attention.",
    "Future-you does not exist yet. Only the next two minutes do.",
    "Lower the bar until it is almost a joke, then start there.",
    "Put on one song. Begin when it begins.",
    "Name the very first physical move, and do only that.",
    "Make it easier, not harder. Comfy clothes, a drink, then begin.",
    "You are allowed to do half. Half is not failure.",
    "If starting feels impossible, resting is a valid choice today."
  ];

  var reduceMotion = false;
  try { reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches; } catch (e) {}

  var last = -1;

  function pick() {
    if (NUDGES.length < 2) return 0;
    var i;
    do { i = Math.floor(Math.random() * NUDGES.length); } while (i === last);
    last = i;
    return i;
  }

  function show(text) {
    if (reduceMotion) { nudgeEl.textContent = text; return; }
    nudgeEl.style.opacity = "0";
    setTimeout(function () {
      nudgeEl.textContent = text;
      nudgeEl.style.opacity = "1";
      card.classList.remove("sweep");
      void card.offsetWidth;
      card.classList.add("sweep");
    }, 180);
  }

  button.addEventListener("click", function () { show(NUDGES[pick()]); });

  show(NUDGES[pick()]);
})();
</script>
</body>
</html>
