<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Breathing Orb</title>
<style>
  :root {
    --green: #4F9D69;
    --glow: rgba(79, 157, 105, 0.42);
    --halo: rgba(79, 157, 105, 0.10);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: transparent; }

  body {
    display: grid;
    place-items: center;
    padding: 14px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  .frame {
    border: 4px solid var(--green);
    border-radius: 24px;
    padding: 30px 34px 22px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    background: transparent;
    box-shadow: 0 14px 50px rgba(79, 157, 105, 0.16);
    max-width: 300px;
    width: 100%;
  }

  .stage {
    width: 190px;
    height: 190px;
    display: grid;
    place-items: center;
  }

  .orb {
    position: relative;
    overflow: hidden;
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 3px solid var(--green);
    background: radial-gradient(circle at 50% 42%, rgba(79,157,105,0.30), rgba(79,157,105,0.10) 60%, transparent 80%);
    box-shadow: 0 0 40px var(--glow), 0 0 0 13px var(--halo);
    transform: scale(0.72);
    transition: transform 4s ease-in-out;
    will-change: transform;
  }

  .orb::before {
    content: "";
    position: absolute;
    inset: 0;
    background: conic-gradient(from 0deg,
      rgba(79,157,105,0.08),
      rgba(79,157,105,0.30) 90deg,
      rgba(79,157,105,0.08) 180deg,
      rgba(79,157,105,0.30) 270deg,
      rgba(79,157,105,0.08) 360deg);
    animation: shimmer 8s linear infinite;
    pointer-events: none;
  }

  @keyframes shimmer {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .label {
    color: var(--green);
    font-size: 21px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-align: center;
    min-height: 26px;
    opacity: 1;
    transition: opacity 0.5s ease;
    user-select: none;
  }

  .toggle {
    appearance: none;
    background: transparent;
    border: 1.5px solid var(--green);
    color: var(--green);
    border-radius: 999px;
    padding: 7px 16px;
    font-size: 12.5px;
    font-family: inherit;
    letter-spacing: 0.04em;
    cursor: pointer;
    opacity: 0.8;
    transition: opacity 0.2s ease;
  }
  .toggle:hover { opacity: 1; }
  .toggle:focus-visible { outline: 2px solid var(--green); outline-offset: 3px; }

  .note {
    color: var(--green);
    opacity: 0.55;
    font-size: 11px;
    line-height: 1.45;
    letter-spacing: 0.02em;
    text-align: center;
    max-width: 232px;
  }

  @media (prefers-reduced-motion: reduce) {
    .orb { transition: none !important; transform: scale(0.88); }
    .orb::before { animation: none; }
  }
</style>
</head>
<body>
  <div class="frame">
    <div class="stage">
      <div class="orb" id="orb"></div>
    </div>
    <div class="label" id="label" aria-live="polite">Ready</div>
    <button class="toggle" id="toggle" type="button">Switch to 4-7-8</button>
    <div class="note">You never have to do this. Stop anytime, and just breathe normally if you feel lightheaded.</div>
  </div>

<script>
(function () {
  var orb = document.getElementById("orb");
  var label = document.getElementById("label");
  var toggle = document.getElementById("toggle");

  var PATTERNS = {
    box: {
      other: "Switch to 4-7-8",
      phases: [["Breathe in", 4, 1.0], ["Hold", 4, 1.0], ["Breathe out", 4, 0.72], ["Hold", 4, 0.72]]
    },
    "478": {
      other: "Switch to box breathing",
      phases: [["Breathe in", 4, 1.0], ["Hold", 7, 1.0], ["Breathe out", 8, 0.72]]
    }
  };

  function safeGet(k) { try { return window.localStorage.getItem(k); } catch (e) { return null; } }
  function safeSet(k, v) { try { window.localStorage.setItem(k, v); } catch (e) {} }

  var reduceMotion = false;
  try { reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches; } catch (e) {}

  var current = safeGet("breathPattern") === "478" ? "478" : "box";
  var timer = null, index = 0;

  function fadeLabel(t) {
    label.style.opacity = "0";
    setTimeout(function () { label.textContent = t; label.style.opacity = "1"; }, 220);
  }

  function runPhase() {
    var phases = PATTERNS[current].phases, phase = phases[index];
    fadeLabel(phase[0]);
    if (!reduceMotion) {
      orb.style.transitionDuration = phase[1] + "s";
      void orb.offsetWidth;
      orb.style.transform = "scale(" + phase[2] + ")";
    }
    index = (index + 1) % phases.length;
    timer = setTimeout(runPhase, phase[1] * 1000);
  }

  function start() {
    if (timer) clearTimeout(timer);
    index = 0;
    if (!reduceMotion) {
      orb.style.transitionDuration = "0s";
      orb.style.transform = "scale(0.72)";
      void orb.offsetWidth;
    }
    runPhase();
  }

  toggle.addEventListener("click", function () {
    current = current === "box" ? "478" : "box";
    safeSet("breathPattern", current);
    toggle.textContent = PATTERNS[current].other;
    start();
  });

  toggle.textContent = PATTERNS[current].other;
  start();
})();
</script>
</body>
</html>
