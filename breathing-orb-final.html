<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Grounding Orb</title>
<style>
  :root {
    --green: #4F9D69;
    --glow: rgba(79, 157, 105, 0.45);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: transparent; }

  body {
    display: grid;
    place-items: center;
    padding: 14px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  .frame {
    border: 4px solid var(--green);
    border-radius: 24px;
    padding: 24px 26px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    background: transparent;
    box-shadow: 0 14px 50px rgba(79, 157, 105, 0.16);
    max-width: 300px;
    width: 100%;
  }

  .eyebrow {
    color: var(--green);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    opacity: 0.8;
  }

  .stage {
    width: 170px;
    height: 170px;
    display: grid;
    place-items: center;
  }

  .orb {
    position: relative;
    width: 142px;
    height: 142px;
    border-radius: 50%;
    cursor: pointer;
    background: radial-gradient(circle at 33% 27%,
      #BFEFD2 0%,
      #79C293 20%,
      #4F9D69 48%,
      #357C53 76%,
      #2A6044 100%);
    box-shadow:
      0 0 44px var(--glow),
      inset -8px -12px 24px rgba(18, 48, 30, 0.40),
      inset 7px 9px 18px rgba(205, 240, 214, 0.30);
    animation: float 7s ease-in-out infinite;
  }

  .orb::before {
    content: "";
    position: absolute;
    top: 16%;
    left: 22%;
    width: 34%;
    height: 26%;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.65), rgba(255,255,255,0) 70%);
    filter: blur(1px);
    pointer-events: none;
  }

  @keyframes float {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.045); }
  }

  .affirmation {
    color: var(--green);
    font-size: 17px;
    font-weight: 500;
    line-height: 1.5;
    letter-spacing: 0.01em;
    text-align: center;
    min-height: 50px;
    display: flex;
    align-items: center;
    opacity: 1;
    transition: opacity 0.6s ease;
    user-select: none;
  }

  .note {
    color: var(--green);
    opacity: 0.5;
    font-size: 11px;
    line-height: 1.4;
    letter-spacing: 0.02em;
    text-align: center;
  }

  @media (prefers-reduced-motion: reduce) {
    .orb { animation: none; }
    .affirmation { transition: none; }
  }
</style>
</head>
<body>
  <div class="frame">
    <div class="eyebrow">A gentle reminder</div>
    <div class="stage">
      <div class="orb" id="orb" role="button" aria-label="Next reminder" tabindex="0"></div>
    </div>
    <div class="affirmation" id="aff" aria-live="polite"></div>
    <div class="note">Stay a moment, or take one with you.</div>
  </div>

<script>
(function () {
  var orb = document.getElementById("orb");
  var aff = document.getElementById("aff");

  var LINES = [
    "You are allowed to take today slowly.",
    "One small thing is enough.",
    "You do not have to earn rest.",
    "There is no behind. You are not late.",
    "It is okay to need things quiet.",
    "Your pace is a valid pace.",
    "You do not have to mask here.",
    "Doing less can be the wise choice.",
    "You are allowed to change your mind.",
    "Rest counts as doing something.",
    "You are enough, exactly as you are today.",
    "It is okay if today is just okay.",
    "Be as kind to yourself as you would be to a friend.",
    "You are allowed to take up space.",
    "Your needs are not too much.",
    "You can rest before you finish.",
    "Stimming is allowed. It helps.",
    "You do not owe anyone an explanation.",
    "Lower the bar. It was never real anyway.",
    "Quiet is a need, not a weakness.",
    "You are allowed to leave when it is too much.",
    "Feelings are information, not problems.",
    "Hard things can be done in small pieces.",
    "It is okay to not be okay today.",
    "You are allowed to ask for help.",
    "Your sensitivity is not a flaw.",
    "Comfort is not something you have to earn.",
    "You can put it down for now.",
    "Progress does not have to be visible.",
    "You are allowed to want things to be easier.",
    "Half done is still progress.",
    "You do not have to keep up with anyone.",
    "Your brain is not broken, just wired differently.",
    "Take the break before you need it.",
    "You are allowed to love what you love.",
    "No is a complete sentence.",
    "You can come back to this later.",
    "Soft days are allowed.",
    "You are doing better than the harsh voice says.",
    "One thing, one moment, that is enough."
  ];

  var reduceMotion = false;
  try { reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches; } catch (e) {}

  var last = -1;
  var timer = null;

  function pick() {
    if (LINES.length < 2) return 0;
    var i;
    do { i = Math.floor(Math.random() * LINES.length); } while (i === last);
    last = i;
    return i;
  }

  function show(text) {
    if (reduceMotion) { aff.textContent = text; return; }
    aff.style.opacity = "0";
    setTimeout(function () {
      aff.textContent = text;
      aff.style.opacity = "1";
    }, 600);
  }

  function next() { show(LINES[pick()]); }

  function schedule() {
    if (timer) clearInterval(timer);
    timer = setInterval(next, 8000);
  }

  function advance() { next(); schedule(); }

  orb.addEventListener("click", advance);
  orb.addEventListener("keydown", function (e) {
    if (e.key === "Enter" || e.key === " ") { e.preventDefault(); advance(); }
  });

  aff.textContent = LINES[pick()];
  schedule();
})();
</script>
</body>
</html>
